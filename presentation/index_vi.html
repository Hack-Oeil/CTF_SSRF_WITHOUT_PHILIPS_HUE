<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <!--Page Title-->
    <title>Hack-Oeil - Les CTFs de Cyrhades</title>
    <!--Meta Keywords and Description-->
    <meta name="keywords" content="">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="shortcut icon" href="./assets/images/favicon.ico" title="Favicon" />
    <link rel="stylesheet" href="./assets/css/style.css">
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,300,600,700,800' rel='stylesheet' type='text/css'>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Vérifie si la fenêtre est dans une iframe
            if (window.self !== window.top) {
                document.querySelectorAll('a').forEach((link) => {
                    link.addEventListener('click', (event) => {
                        const a = event.target.closest('a[href^="http"]');
                        if (a) {
                            event.preventDefault();
                            window.parent.postMessage({
                                type: "open-external",
                                url: a.href
                            }, "*");
                        }
                    });
                });
            }
        });
    </script>
</head>

<body>

    <div id="wrapper">
        <!--Main Content Area-->
        <main id="content">
            <!--Ctf-->
            <section class="ctf scrollto">
                <div class="row clearfix">
                    <div class="col-39">
                        <div class="section-heading">
                            <h3>Challenge #34</h3>
                            <h2 class="section-title">Blog + đèn (không có Philips Hue)</h2>
                            <p class="section-subtitle">
                                Thử thách này giải thích cuộc tấn công SSRF mà không cần đèn Philips Hue. Đèn được mô phỏng.
                            </p>
                            <h4>Xem trước:</h4>
                            <img class="capture" src="./assets/images/capture.jpg" alt="aperçu">
                        </div>
                    </div>
                </div>
                <div class="row clearfix">
                    <div class="col-39">
                        <div class="section-heading">
                            <h3>Học tập</h3>
                            <h2 class="section-title">Tài liệu và Video</h2>
                            <p class="section-subtitle">
                                Chưa có tài liệu
                            </p>
                        </div>
                    </div>
                </div>

                <div class="row clearfix">
                    <div class="col-39">
                        <div class="section-heading">
                            <h3>Trợ giúp</h3>
                            <h2 class="section-title">Mẹo và thủ thuật</h2>
                            <p class="section-subtitle">
                                <a target="_blank"
                                    href="https://discord.com/channels/1175764392307077120/1175764601716092948">Fil sur
                                    le Discord</a>
                            </p>
                        </div>
                    </div>
                </div>
            </section>
            <!--End of Ctf-->
        </main>
        <!--End Main Content Area-->

        <a id="scrollUp" href="#wrapper" style="position: fixed; z-index: 1000;" title="Remonter en tête de site"></a>
    </div>
